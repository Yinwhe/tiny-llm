# Build and test the reference solution automatically on Linux CUDA runners.
name: Linux CUDA

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-refsol:
    name: Test reference solution
    runs-on: [self-hosted, linux, x64, cuda]
    steps:
      - uses: actions/checkout@v5

      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.12"
          cache: true

      - name: Install Hugging Face CLI
        run: python -m pip install -U "huggingface_hub[cli]"

      - name: Download model weights
        run: hf download Qwen/Qwen2-0.5B-Instruct-AWQ

      - run: pdm install

      - run: pdm run check-installation

      - name: Add nanobind to CMake
        run: |
          nanobind_dir=$(pdm run python -c 'import nanobind, os; print(os.path.join(nanobind.__path__[0], "cmake"))')
          echo "nanobind_DIR=${nanobind_dir}" >> $GITHUB_ENV

      - name: Build extensions
        run: |
          pdm run build-ext
          pdm run build-ext-ref

      - name: Run reference tests
        run: pdm run test-refsol
